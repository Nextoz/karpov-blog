name: PR checks

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  hugo-build-seo-i18n-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.9"
          extended: true

      - name: Print Hugo config clues
        shell: bash
        run: |
          echo "---- hugo.toml language/config lines ----"
          grep -nE 'baseURL|publishDir|defaultContentLanguage|defaultContentLanguageInSubdir|contentDir|\[languages|languageCode|languageName' hugo.toml || true
          echo "---- content root ----"
          find content -maxdepth 3 -type f | sort

      - name: Build Hugo site
        run: hugo --gc --minify --baseURL "https://nextoz.github.io/karpov-blog/"

      - name: Show generated public files
        shell: bash
        run: |
          echo "---- generated files ----"
          find public -maxdepth 4 -type f | sort | head -300

      - name: Check important generated pages exist
        shell: bash
        run: |
          echo "Checking expected Danish root pages and English /en/ pages..."

          missing=0

          for file in \
            public/index.html \
            public/en/index.html \
            public/projekter/index.html \
            public/en/projects/index.html \
            public/posts/index.html \
            public/en/posts/index.html \
            public/sitemap.xml
          do
            if [ -f "$file" ]; then
              echo "OK: $file"
            else
              echo "MISSING: $file"
              missing=1
            fi
          done

          echo ""
          echo "Generated HTML files:"
          find public -maxdepth 4 -name "index.html" | sort

          exit $missing

      - name: Check language switcher exists on important pages
        shell: bash
        run: |
          grep -q "global-language-switch" public/index.html
          grep -q "global-language-switch" public/en/index.html
          grep -q "global-language-switch" public/projekter/index.html
          grep -q "global-language-switch" public/en/projects/index.html
          grep -q "global-language-switch" public/posts/index.html
          grep -q "global-language-switch" public/en/posts/index.html

      - name: Debug hreflang output
        shell: bash
        run: |
          echo "---- Danish portfolio head hreflang/canonical/alternate ----"
          grep -oiE '<link[^>]+(alternate|canonical|hreflang)[^>]*>' public/projekter/index.html || true

          echo "---- English portfolio head hreflang/canonical/alternate ----"
          grep -oiE '<link[^>]+(alternate|canonical|hreflang)[^>]*>' public/en/projects/index.html || true

          echo "---- Does generated HTML contain extend_head output? ----"
          grep -R "x-default" public/projekter/index.html public/en/projects/index.html || true

      - name: Check multilingual hreflang links exist
        shell: bash
        run: |
          grep -q 'hreflang="da' public/projekter/index.html
          grep -q 'hreflang="en' public/projekter/index.html
          grep -q 'hreflang="da' public/en/projects/index.html
          grep -q 'hreflang="en' public/en/projects/index.html

      - name: Check canonical links exist
        shell: bash
        run: |
          grep -q 'rel="canonical"' public/index.html
          grep -q 'rel="canonical"' public/en/index.html
          grep -q 'rel="canonical"' public/projekter/index.html
          grep -q 'rel="canonical"' public/en/projects/index.html

      - name: Check sitemap contains both languages
        shell: bash
        run: |
          grep -q "https://nextoz.github.io/karpov-blog/projekter/" public/sitemap.xml
          grep -q "https://nextoz.github.io/karpov-blog/en/projects/" public/sitemap.xml
          grep -q "https://nextoz.github.io/karpov-blog/posts/" public/sitemap.xml
          grep -q "https://nextoz.github.io/karpov-blog/en/posts/" public/sitemap.xml

      - name: Check Danish and English portfolio content is not mixed
        shell: bash
        run: |
          grep -q "Det recruiters skal forstå" public/projekter/index.html
          ! grep -q "What I want recruiters to understand" public/projekter/index.html

          grep -q "What I want recruiters to understand" public/en/projects/index.html
          ! grep -q "Det recruiters skal forstå" public/en/projects/index.html

      - name: Check English blog posts were generated
        shell: bash
        run: |
          test -f public/en/posts/devops-er-ikke-en-pipeline/index.html
          test -f public/en/posts/ai-er-ikke-laengere-en-chatbot/index.html
          test -f public/en/posts/ai-er-ikke-fyringsgrund/index.html
          test -f public/en/posts/project-glasswing/index.html

      - name: Check no backup files are tracked
        shell: bash
        run: |
          ! git ls-files | grep -E '\.bak$|before-language-fix|before-i18n-fix'



