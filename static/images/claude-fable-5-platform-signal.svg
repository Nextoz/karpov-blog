<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Claude Fable 5 som platform-signal</title>
  <desc id="desc">Infografik med centrale tal for Claude Fable 5 og den praktiske platformkonsekvens.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141923"/>
      <stop offset="0.52" stop-color="#1f2a33"/>
      <stop offset="1" stop-color="#21332b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#d9f99d" stroke-width="2">
    <path d="M110 150 C250 70 350 230 510 130 S820 80 1020 170" fill="none"/>
    <path d="M130 520 C340 410 430 570 620 470 S920 390 1080 500" fill="none"/>
    <circle cx="110" cy="150" r="5" fill="#d9f99d"/>
    <circle cx="510" cy="130" r="5" fill="#d9f99d"/>
    <circle cx="1020" cy="170" r="5" fill="#d9f99d"/>
    <circle cx="130" cy="520" r="5" fill="#d9f99d"/>
    <circle cx="620" cy="470" r="5" fill="#d9f99d"/>
    <circle cx="1080" cy="500" r="5" fill="#d9f99d"/>
  </g>
  <text x="72" y="88" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">Claude Fable 5 er ikke kun en modelnyhed</text>
  <text x="74" y="130" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Den er et signal om, at frontier AI nu skal drives som en rigtig platform.</text>
  <g filter="url(#shadow)">
    <rect x="72" y="190" width="235" height="170" rx="8" fill="#f8fafc"/>
    <rect x="338" y="190" width="235" height="170" rx="8" fill="#f8fafc"/>
    <rect x="604" y="190" width="235" height="170" rx="8" fill="#f8fafc"/>
    <rect x="870" y="190" width="235" height="170" rx="8" fill="#f8fafc"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="98" y="242" fill="#0f172a" font-size="42" font-weight="800">1M</text>
    <text x="98" y="282" fill="#334155" font-size="21" font-weight="600">context window</text>
    <text x="98" y="320" fill="#64748b" font-size="17">Nok til store kodebaser,</text>
    <text x="98" y="344" fill="#64748b" font-size="17">men ikke nok til uklare krav.</text>
    <text x="364" y="242" fill="#0f172a" font-size="42" font-weight="800">128K</text>
    <text x="364" y="282" fill="#334155" font-size="21" font-weight="600">max output</text>
    <text x="364" y="320" fill="#64748b" font-size="17">Lange svar kræver review,</text>
    <text x="364" y="344" fill="#64748b" font-size="17">tests og stopkriterier.</text>
    <text x="630" y="242" fill="#0f172a" font-size="42" font-weight="800">$10 / $50</text>
    <text x="630" y="282" fill="#334155" font-size="21" font-weight="600">per 1M tokens</text>
    <text x="630" y="320" fill="#64748b" font-size="17">Budgettering er ikke pynt,</text>
    <text x="630" y="344" fill="#64748b" font-size="17">det er produktdesign.</text>
    <text x="896" y="242" fill="#0f172a" font-size="42" font-weight="800">&lt;5%</text>
    <text x="896" y="282" fill="#334155" font-size="21" font-weight="600">safeguard sessions</text>
    <text x="896" y="320" fill="#64748b" font-size="17">Fallback er en normal path,</text>
    <text x="896" y="344" fill="#64748b" font-size="17">ikke en undtagelse.</text>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="160" y="440" width="190" height="74" rx="8" fill="#bbf7d0"/>
    <text x="190" y="486" fill="#14532d" font-size="23" font-weight="700">model</text>
    <path d="M360 477 H468" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round"/>
    <path d="M452 462 L470 477 L452 492" fill="none" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="482" y="440" width="230" height="74" rx="8" fill="#fde68a"/>
    <text x="516" y="486" fill="#78350f" font-size="23" font-weight="700">guardrails</text>
    <path d="M725 477 H833" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round"/>
    <path d="M817 462 L835 477 L817 492" fill="none" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="848" y="440" width="230" height="74" rx="8" fill="#bfdbfe"/>
    <text x="886" y="486" fill="#1e3a8a" font-size="23" font-weight="700">platform</text>
    <text x="136" y="560" fill="#e2e8f0" font-size="23" font-weight="700">Den praktiske nyhed:</text>
    <text x="372" y="560" fill="#cbd5e1" font-size="23">AI-kapabilitet kommer nu med routing, logging, fallback,</text>
    <text x="372" y="592" fill="#cbd5e1" font-size="23">governance og regninger.</text>
  </g>
  <text x="72" y="635" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Kilder: Anthropic launch post og Claude API docs, juni 2026.</text>
</svg>
