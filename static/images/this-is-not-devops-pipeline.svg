<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">This is not a pipeline</title>
  <desc id="desc">A simple stylized CI/CD pipeline illustration with the caption Dette er ikke DevOps.</desc>
  <rect width="1200" height="630" fill="#111827"/>
  <rect x="120" y="150" width="960" height="210" rx="48" fill="none" stroke="#e5e7eb" stroke-width="18"/>
  <circle cx="260" cy="255" r="42" fill="#e5e7eb"/>
  <circle cx="470" cy="255" r="42" fill="#e5e7eb"/>
  <circle cx="680" cy="255" r="42" fill="#e5e7eb"/>
  <circle cx="890" cy="255" r="42" fill="#e5e7eb"/>
  <path d="M302 255 H428 M512 255 H638 M722 255 H848" stroke="#e5e7eb" stroke-width="18" stroke-linecap="round"/>
  <text x="600" y="470" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="64"
        fill="#f9fafb">
    Dette er ikke DevOps.
  </text>
  <text x="600" y="535" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="28"
        fill="#9ca3af">
    Det er kun en pipeline.
  </text>
</svg>
