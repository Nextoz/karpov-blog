<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI-adoption og agent-gabet i 2026</title>
  <desc id="desc">Søjlediagram med statistik om generativ AI-adoption, agent-performance og agent-deployment.</desc>
  <rect width="1200" height="675" fill="#0f172a"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="72" y="88" fill="#f8fafc" font-size="44" font-weight="700">AI er udbredt. Agentdrift er stadig ung.</text>
    <text x="74" y="130" fill="#cbd5e1" font-size="22">Det vigtigste gap er ikke kun intelligens. Det er produktion, governance og måling.</text>
  </g>
  <line x1="120" y1="525" x2="1080" y2="525" stroke="#334155" stroke-width="2"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">
    <rect x="170" y="361" width="150" height="164" rx="6" fill="#67e8f9"/>
    <text x="187" y="341" fill="#f8fafc" font-size="34">53%</text>
    <text x="145" y="585" fill="#cbd5e1" font-size="17">befolknings-</text>
    <text x="156" y="608" fill="#cbd5e1" font-size="17">adoption</text>
    <text x="154" y="631" fill="#94a3b8" font-size="14">generativ AI</text>
    <rect x="415" y="285" width="150" height="240" rx="6" fill="#a7f3d0"/>
    <text x="432" y="265" fill="#f8fafc" font-size="34">77.3%</text>
    <text x="400" y="585" fill="#cbd5e1" font-size="17">agents på</text>
    <text x="379" y="608" fill="#cbd5e1" font-size="17">real-world tasks</text>
    <text x="405" y="631" fill="#94a3b8" font-size="14">Terminal-Bench</text>
    <rect x="660" y="237" width="150" height="288" rx="6" fill="#fde68a"/>
    <text x="683" y="232" fill="#f8fafc" font-size="34">93%</text>
    <text x="660" y="585" fill="#cbd5e1" font-size="17">cyber-agent</text>
    <text x="681" y="608" fill="#cbd5e1" font-size="17">opgaver</text>
    <text x="682" y="631" fill="#94a3b8" font-size="14">AI Index</text>
    <rect x="905" y="495" width="150" height="30" rx="6" fill="#fca5a5"/>
    <text x="936" y="475" fill="#f8fafc" font-size="34">&lt;10%</text>
    <text x="885" y="585" fill="#cbd5e1" font-size="17">agent-deployments</text>
    <text x="912" y="608" fill="#cbd5e1" font-size="17">i funktioner</text>
    <text x="920" y="631" fill="#94a3b8" font-size="14">single digits</text>
  </g>
  <g fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">
    <text x="86" y="528">0</text>
    <text x="78" y="451">25</text>
    <text x="78" y="373">50</text>
    <text x="78" y="296">75</text>
    <text x="70" y="218">100</text>
  </g>
  <g stroke="#1e293b" stroke-width="1">
    <line x1="120" y1="448" x2="1080" y2="448"/>
    <line x1="120" y1="370" x2="1080" y2="370"/>
    <line x1="120" y1="293" x2="1080" y2="293"/>
    <line x1="120" y1="215" x2="1080" y2="215"/>
  </g>
  <rect x="92" y="145" width="1016" height="50" rx="8" fill="#172033" opacity="0.94"/>
  <text x="122" y="178" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Pointen: Teams bruger AI hurtigere, end de bygger rammerne rundt om AI.</text>
  <text x="72" y="660" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Kilde: Stanford HAI AI Index 2026. Agent-deployment er angivet som single digits på tværs af næsten alle business functions.</text>
</svg>
