[[params.socialIcons]]
name = "github"
url = "https://github.com/Nextoz"

[[params.socialIcons]]
name = "email"
url = "mailto:evkar91@gmail.com"


[[params.socialIcons]]
name = "phone"
url = "tel:+4525500024"
[params.analytics]
# google = "G-XXXXXXXXXX"

[params.analytics.google]
