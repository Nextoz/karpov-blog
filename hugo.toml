baseURL = 'https://evgenykarpov.dk/'
locale = 'da-DK'
defaultContentLanguage = 'da'
title = 'Evgeny Karpov'
theme = 'PaperMod'
paginate = 10
ignoreLogs = ['warning-goldmark-raw-html']

enableRobotsTXT = true
buildDrafts = false

[markup.goldmark.renderer]
  unsafe = true

[params]
  env = "production"
  title = "Evgeny Karpov"
  description = "DevOps-ingeniør og softwareudvikler med erfaring i .NET, CI/CD, Kubernetes og AI. Skriver om teknologi, digitalisering og teknologipolitik i Danmark."
  keywords = ["DevOps", "AI", "Teknologipolitik", "Digitalisering", "Danmark", ".NET", "CI/CD", "Kubernetes", "Azure", "softwareudvikling"]
  author = "Evgeny Karpov"
  images = ["images/profile.jpg"]
  DateFormat = "2. January 2006"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true

  [params.homeInfoParams]
    Title = "Hej, jeg er Evgeny"
    Content = """
Software engineer med erfaring inden for .NET, DevOps og AI. \
Optaget af hvordan Danmark navigerer AI-revolutionen — fra regulering til reel implementering. \
Skriver om teknologi, digitalisering og politik."""

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/evgenykarpov91/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Nextoz"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:evgeny@karpov.dk"

  [params.analytics]
    # google = "G-XXXXXXXXXX"  # Add later when you have a GA4 ID

  [params.label]
    text = "Evgeny Karpov"
    icon = "images/profile.jpg"
    iconHeight = 35

  [params.profileMode]
    enabled = false

  [params.assets]
    disableFingerprinting = false

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "om"
    name = "Om mig"
    url = "/om/"
    weight = 20

  [[menu.main]]
    identifier = "projekter"
    name = "Projekter"
    url = "/projekter/"
    weight = 30

  [[menu.main]]
    identifier = "tags"
    name = "Emner"
    url = "/tags/"
    weight = 40

  [[menu.main]]
    identifier = "search"
    name = "Søg"
    url = "/search/"
    weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
