defaultContentLanguageInSubdir = false
baseURL = "https://nextoz.github.io/karpov-blog/"
locale = "da-DK"
defaultContentLanguage = "da"
title = "Evgeny Karpov"
theme = "PaperMod"
ignoreLogs = ["warning-goldmark-raw-html"]
enableRobotsTXT = true
buildDrafts = false

[pagination]
pagerSize = 10
[markup.goldmark.renderer]
unsafe = true

[params]

ShowLanguageSwitcher = true
env = "production"
title = "Evgeny Karpov"
description = "DevOps & Platform Engineer i København. Skriver om Azure DevOps, .NET, Kubernetes, CI/CD, observability, AI-assisteret softwareudvikling og teknologipolitik."
keywords = [
  "DevOps Engineer Copenhagen",
  "Platform Engineer Copenhagen",
  "Azure DevOps",
  ".NET",
  "C#",
  "Kubernetes",
  "CI/CD",
  "Observability",
  "AI",
  "AI-assisteret softwareudvikling",
  "Teknologipolitik",
  "Digitalisering",
  "Danmark"
]
author = "Evgeny Karpov"
phone = "+45 25 50 00 24"
images = ["images/profile.jpg"]
DateFormat = "2. January 2006"
defaultTheme = "dark"
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = false
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
hidemeta = false
hideSummary = false
showtoc = true

[params.homeInfoParams]
Title = "Evgeny Karpov"
Content = """
DevOps & Platform Engineer i København med baggrund i .NET, Azure DevOps, Kubernetes, CI/CD og platform engineering.

Jeg skriver om software, drift, AI, digitalisering og hvordan moderne teknologi faktisk bliver sat i produktion.

Start med portfolioen, hvis du vil se mine tekniske erfaringer. Start med bloggen, hvis du vil læse mine klummer og tekniske noter.
"""

[[params.socialIcons]]
name = "linkedin"
