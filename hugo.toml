hiddenInSingle = false

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 0
keys = ["title", "permalink", "summary", "content"]

[outputs]
home = ["HTML", "RSS", "JSON", "SITEMAP"]

[sitemap]
changefreq = "daily"
filename = "sitemap.xml"
priority = 0.7

[markup]

[markup.highlight]
codeFences = true
guessSyntax = true
lineNos = true
style = "monokai"

